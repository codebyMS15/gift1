<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Valentine's Day</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fae1dd;

        }

        .container {
            position: relative;



        }

        .valentines {
            position: relative;
            top: 50px;
            cursor: pointer;
            animation: up 3s linear infinite;

        }

        @keyframes up {

            0%,
            100% {
                transform: translateY(0);

            }

            50% {
                transform: translateY(-30px);



            }

        }

        .envelope {

            position: relative;
            width: 300px;
            height: 300px;
            background-color: #f08080;

        }

        .envelope::before {
            background-color: #f08080;
            content: "";
            position: absolute;
            width: 212px;
            height: 212px;
            transform: rotate(45deg);
            top: -105px;
            left: 44px;
            border-radius: 30px 0 0 0;
        }

        .card {
            position: absolute;
            background-color: #eae2b7;
            width: 270px;
            height: 170px;
            top: 5px;
            left: 15px;
            box-shadow: -5px -5px 100px rgba(0, 0, 0, 0.4);


        }

        .card::before {
            content: "";
            position: absolute;
            border: 3px solid #003049;
            border-style: dotted;
            width: 240px;
            height: 140px;
            left: 12px;
            top: 12px;



        }

        .text {
            position: absolute;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, cursive;
            font-size: 28px;
            text-align: center;
            line-height: 25px;
            top: 19px;
            left: 85px;
            color: #003049;





        }

        .heart {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            width: 30px;
            height: 30px;
            background-color: #d62828;
            z-index: 1;
        }


        .heart::before,
        .heart::after {
            content: "";
            background-color: #d62828;
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;



        }

        .heart::before {
            top: -15px;
            left: 0;
        }

        .heart::after {

            left: 15px;
            top: 0;
        }

        .hearts {
            position: absolute;
            top: 10px;



        }


        @keyframes heart {
            0% {
                transform: translateY(0) rotate(-45deg) scale(0.3);
                opacity: 1;



            }

            100% {
                transform: translateY(-150px) rotate(-45deg) scale(1);
                opacity: 0;

            }

        }



        .one,
        .two,
        .three,
        .four,
        .five {
            background-color: red;
            display: inline-block;
            height: 10px;
            width: 10px;
            margin: 0 10px;
            position: relative;
            transform: rotate(-45deg);
            top: 50px;
        }


        .one::before,
        .one::after,
        .two::before,
        .two::after,
        .three::before,
        .three::after,
        .four::before,
        .four::after,
        .five::before,
        .five::after {
            content: "";
            background-color: red;
            border-radius: 50%;
            width: 10px;
            height: 10px;
            position: absolute;
        }

        .one::before,
        .two::before,
        .three::before,
        .four::before,
        .five::before {
            top: -5px;
            left: 0;
        }

        .one::after,
        .two::after,
        .three::after,
        .four::after,
        .five::after {
            top: 0;
            left: 5px;
        }



        .one {
            left: 10px;
            animation: heart 1s ease-out infinite;



        }

        .two {
            left: 30px;
            animation: heart 2s ease-out infinite;



        }

        .three {
            left: 50px;
            animation: heart 1.5s ease-out infinite;



        }

        .four {
            left: 70px;
            animation: heart 2.3s ease-out infinite;



        }

        .five {
            left: 90px;
            animation: heart 1.7s ease-out infinite;



        }

        .front {
            position: absolute;
            border-right: 180px solid #f4978e;
            border-top: 95px solid transparent;
            border-bottom: 100px solid transparent;
            left: 120px;
            top: 5px;
            width: 0;
            height: 0;
            z-index: 10;


        }

        .front::before {
            position: absolute;
            content: "";
            border-left: 300px solid #f8ad9d;
            border-top: 195px solid transparent;
            left: -120px;
            top: -95px;
            width: 0;
            height: 0;
        }

        .shadow {
            position: absolute;
            width: 330px;
            height: 25px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.03);
            top: 265px;
            left: 50%;
            z-index: -1;
            animation: scale 3s linear infinite;
            transform-origin: center;
            transform: translateX(-50%);




        }

        .text {
            transition: opacity 0.4s ease;
        }

        .card.open .text {
            opacity: 0;
        }

        @keyframes scale {

            0%,
            100% {

                transform: scaleX(1);

            }

            50% {
                transform: scaleX(0.85);


            }

        }

        .card {
            transition: transform 0.6s ease;
            transform: translateY(0);
            z-index: 5;
        }

        .card.open {
            transform: translateY(-140px);
        }

        .card:hover {
            box-shadow: 0 0 25px rgba(214, 40, 40, 0.6);
        }

        .secret {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 220px;
            transform: translate(-50%, -50%);
            font-size: 14px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease 0.2s;
            color: #003049;
            pointer-events: none;
            z-index: 3;

            .secret {
                padding-bottom: 35px;
            }
        }

        .card.open .secret {
            opacity: 1;

        }

        .card,
        .envelope::before {
            will-change: transform;
            
        }.container {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}
    </style>
   <script>
document.addEventListener("DOMContentLoaded", function () {

    const container = document.querySelector(".container");
    const card = document.querySelector(".card");

    // Desktop hover
    container.addEventListener("mouseenter", () => {
        card.classList.add("open");
    });

    container.addEventListener("mouseleave", () => {
        card.classList.remove("open");
    });

    // Mobile tap support
    container.addEventListener("click", () => {
        card.classList.toggle("open");
    });

});
</script>
</head>

<body>
    <div class="container">
        <div class="valentines">
            <div class="envelope"></div>
            <div class="front"></div>
            <div class="card" id="card" onclick="openCard()">
                <div class="text">Happy<br>valentine's <br>day</div>
                <div class="secret" id="secret">
                    You are the most beautiful part of my life.
                    Every day with you feels like a dream.
                    I love you forever. ❤️
                    <br><br>
                    – Your Mayank 💌
                </div>
                <div class="heart"></div>
            </div>
            <div class="hearts">
                <div class="one"></div>
                <div class="two"></div>
                <div class="three"></div>
                <div class="four"></div>
                <div class="five"></div>
            </div>

        </div>
    </div>
    <div class="shadow"></div>












</body>

</html>
